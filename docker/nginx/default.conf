# ═══════════════════════════════════════════════════
# Nginx Reverse Proxy — istxbot (Docker)
# ═══════════════════════════════════════════════════

# استخدام DNS Docker الداخلي مع حل عند الطلب
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# ── الموقع العام (istx.io) — وضع الصيانة ──
server {
    listen 80;
    server_name istx.io www.istx.io tiktok.istx.io localhost;

    # Webhook بوت تيليجرام — يبقى شغال
    location /api/bot/webhook {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API التحميل يبقى شغال للبوت
    location /api/ {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # الملفات الثابتة
    location /static/ {
        alias /app/static/;
        expires 7d;
    }

    # صفحة الصيانة — كل شي ثاني
    location / {
        root /app/maintenance;
        try_files /maintenance.html =404;
    }
}

# ── لوحة إدارة الويب (admin.istx.io) ──
server {
    listen 80;
    server_name admin.istx.io;

    location /admin/ {
        alias /app/admin-panel/dist/;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    location /bot-api/ {
        set $wc_backend web-control:8082;
        proxy_pass http://$wc_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        set $wc_backend web-control:8082;
        proxy_pass http://$wc_backend/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── لوحة المراقبة (monitor.istx.io) ──
server {
    listen 80;
    server_name monitor.istx.io;

    location / {
        set $mon_backend monitor:8090;
        proxy_pass http://$mon_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── inspiredownloader.com HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name inspiredownloader.com www.inspiredownloader.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── inspiredownloader.com (WordPress + API) ──
server {
    listen 443 ssl;
    server_name inspiredownloader.com www.inspiredownloader.com;

    ssl_certificate /etc/letsencrypt/live/inspiredownloader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inspiredownloader.com/privkey.pem;

    root /app/wp;
    index index.php index.html;
    client_max_body_size 64M;

    # API والمكافآت → حاوية web
    location /reward/ {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WordPress
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /home/ngm/tiktok-wp$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    }

    # منع الوصول للملفات الحساسة
    location ~ /\.(?!well-known) {
        deny all;
    }
}

# ── istx.io SSL (صيانة) ──
server {
    listen 443 ssl;
    server_name istx.io www.istx.io tiktok.istx.io;

    ssl_certificate /etc/letsencrypt/live/www.istx.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.istx.io/privkey.pem;

    # Webhook للبوت
    location /api/bot/webhook {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        alias /app/static/;
    }

    location / {
        root /app/maintenance;
        try_files /maintenance.html =404;
    }
}
