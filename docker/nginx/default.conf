# ═══════════════════════════════════════════════════
# Nginx Reverse Proxy — istxbot (Docker)
# ═══════════════════════════════════════════════════

# استخدام DNS Docker الداخلي مع حل عند الطلب
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# ── الموقع العام (istx.io + النطاقات الفرعية) ──
server {
    listen 80;
    server_name istx.io www.istx.io tiktok.istx.io localhost;

    # الملفات الثابتة
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API وموقع الويب → حاوية web:8080
    location / {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500m;
    }

    # Webhook بوت تيليجرام
    location /api/bot/webhook {
        set $web_backend web:8080;
        proxy_pass http://$web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── لوحة إدارة الويب (admin.istx.io) ──
server {
    listen 80;
    server_name admin.istx.io;

    location /admin/ {
        alias /app/admin-panel/dist/;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    location /bot-api/ {
        set $wc_backend web-control:8082;
        proxy_pass http://$wc_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        set $wc_backend web-control:8082;
        proxy_pass http://$wc_backend/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── لوحة المراقبة (monitor.istx.io) ──
server {
    listen 80;
    server_name monitor.istx.io;

    location / {
        set $mon_backend monitor:8090;
        proxy_pass http://$mon_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
