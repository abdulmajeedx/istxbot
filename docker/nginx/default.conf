# ═══════════════════════════════════════════════════
# Nginx Reverse Proxy — istxbot
# ═══════════════════════════════════════════════════

# ── الموقع العام (istx.io + النطاقات الفرعية) ──
server {
    listen 80;
    server_name istx.io www.istx.io tiktok.istx.io;

    # الملفات الثابتة
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API وموقع الويب → حاوية web:8080
    location / {
        proxy_pass http://web:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;

        # مهلة أطول للتحميلات
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # حجم رفع أكبر
        client_max_body_size 500m;
    }

    # Webhook بوت تيليجرام
    location /api/bot/webhook {
        proxy_pass http://web:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── لوحة إدارة الويب (admin.istx.io أو /admin) ──
server {
    listen 80;
    server_name admin.istx.io;

    # Admin Panel (React static) + API proxy
    location /admin/ {
        alias /app/admin-panel/dist/;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # Admin API → حاوية web-control:8082
    location /bot-api/ {
        proxy_pass http://web-control:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API المشرف → حاوية web-control:8082
    location /api/admin/ {
        proxy_pass http://web-control:8082/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── لوحة المراقبة (monitor.istx.io) ──
server {
    listen 80;
    server_name monitor.istx.io;

    location / {
        proxy_pass http://monitor:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── Upstream للتحميل (زيادة الأداء) ──
upstream web_backend {
    server web:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
# ملاحظة: يجب أن تكون الخدمات شغالة قبل nginx
